version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: angelquant_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: angelquant_db
      MYSQL_USER: aquser
      MYSQL_PASSWORD: aqpass123
      MYSQL_ROOT_PASSWORD: rootpass123
    ports:
      - "3306:3306"
    volumes:
      - ./data:/var/lib/mysql
      - ./src/db/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: angelquant_app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file: .env
    environment:
      DB_HOST: db
    volumes:
      - .:/app
      - /app/node_modules
